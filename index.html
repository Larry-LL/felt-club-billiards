<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felt Club — 8-Ball Billiards</title>
    <meta name="description" content="Play 8-ball billiards online with friends or against the computer. No download, no signup." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── Lobby screen ──────────────────────────────────── -->
    <div id="lobbyScreen" class="lobby-screen">
      <div class="lobby-container">
        <div class="lobby-header">
          <h1 class="lobby-logo">Felt Club</h1>
          <p class="lobby-tagline">8-Ball Billiards — play anyone, anywhere</p>
        </div>

        <div class="lobby-card">
          <input id="nameInput" type="text" maxlength="24" placeholder="Enter your name" />

          <div class="lobby-actions">
            <button id="quickMatchButton" class="primary-button lobby-btn" type="button">
              Quick Match
            </button>
            <div class="lobby-row">
              <button id="computerButton" class="secondary-button lobby-btn" type="button">
                Solo vs Computer
              </button>
              <button id="createPrivateButton" class="secondary-button lobby-btn" type="button">
                Private Room
              </button>
            </div>
          </div>

          <div id="joinSection" class="join-section hidden">
            <div class="join-row">
              <input id="roomInput" type="text" maxlength="8" placeholder="Room code" />
              <button id="joinRoomButton" class="primary-button" type="button">Join</button>
            </div>
          </div>
        </div>

        <div id="lobbyStats" class="lobby-stats">
          <span id="statsOnline">0 online</span>
          <span class="lobby-stats-dot"></span>
          <span id="statsGames">0 games</span>
        </div>

        <div id="openRooms" class="open-rooms hidden">
          <span class="stat-label">Open Tables</span>
          <div id="openRoomsList" class="open-rooms-list"></div>
        </div>

        <div id="lobbyMessage" class="message hidden"></div>
      </div>
    </div>

    <!-- ── Game screen ───────────────────────────────────── -->
    <div id="gameScreen" class="shell hidden">
      <aside class="sidebar">
        <div class="sidebar-top">
          <button id="leaveButton" class="leave-button" type="button" title="Leave table">&larr;</button>
          <h1 class="logo">Felt Club</h1>
        </div>

        <div id="invitePanel" class="invite-panel hidden">
          <span class="invite-label">Invite a friend</span>
          <button id="copyInviteButton" class="secondary-button" type="button">Copy Link</button>
        </div>

        <div id="waitingPanel" class="invite-panel hidden">
          <span class="invite-label">Waiting for opponent</span>
          <p class="waiting-text">Share the link or wait for a quick match player.</p>
        </div>

        <div id="message" class="message hidden"></div>

        <div id="statusBar" class="status-bar hidden">
          <div class="stat">
            <span class="stat-label">Turn</span>
            <strong id="turnText">—</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Table</span>
            <strong id="tableStateText">—</strong>
          </div>
        </div>

        <div id="scoreboard" class="scoreboard"></div>

        <div id="powerBar" class="power-bar hidden">
          <span class="stat-label">Power</span>
          <div class="power-track">
            <div id="powerFill" class="power-fill"></div>
          </div>
          <span id="powerValue" class="power-value">0%</span>
        </div>

        <div class="controls-hint">
          <span class="stat-label">Controls</span>
          <p>&larr; &rarr; Aim &middot; Hold Space to charge &middot; Release to shoot</p>
        </div>

        <button id="restartButton" class="secondary-button re-rack" type="button" disabled>Re-Rack</button>
      </aside>

      <main class="table-area">
        <div class="canvas-wrap">
          <canvas id="tableCanvas" width="960" height="520"></canvas>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
