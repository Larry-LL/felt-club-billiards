<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felt Club 8-Ball</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <h1 class="logo">Felt Club</h1>

        <input id="nameInput" type="text" maxlength="24" placeholder="Your name" />
        <input id="roomInput" type="hidden" />

        <div id="modeButtons" class="button-col">
          <button id="computerButton" class="primary-button" type="button">Solo vs Computer</button>
          <button id="onlineButton" class="secondary-button" type="button">Play Online</button>
        </div>

        <div id="joinButtons" class="button-col hidden">
          <button id="joinRoomButton" class="primary-button" type="button">Join Game</button>
        </div>

        <div id="invitePanel" class="invite-panel hidden">
          <span class="invite-label">Invite a friend</span>
          <button id="copyInviteButton" class="secondary-button" type="button">Copy Link</button>
        </div>

        <div id="message" class="message hidden"></div>

        <div id="statusBar" class="status-bar hidden">
          <div class="stat">
            <span class="stat-label">Turn</span>
            <strong id="turnText">—</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Table</span>
            <strong id="tableStateText">—</strong>
          </div>
        </div>

        <div id="scoreboard" class="scoreboard"></div>

        <button id="restartButton" class="secondary-button re-rack" type="button" disabled>Re-Rack</button>
      </aside>

      <main class="table-area">
        <div class="canvas-wrap">
          <canvas id="tableCanvas" width="960" height="520"></canvas>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
